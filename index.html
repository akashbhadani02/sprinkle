<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <title>ફળની રમત - ઓળખો અને પકડો</title>
    <style>
        body { margin: 0; background: #FFEFD5; text-align: center; font-family: sans-serif; overflow: hidden; }
        #msg { font-size: 35px; color: #d35400; font-weight: bold; margin: 10px; }
        #canvas { position: fixed; inset: 0; pointer-events: none; }
        #video { position: fixed; top: 10px; right: 10px; width: 150px; transform: scaleX(-1); border: 4px solid white; }
        #startBtn { padding: 20px 40px; font-size: 25px; margin-top: 15%; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="msg">રમત શરૂ કરવા બટન દબાવો</div>
    <button id="startBtn">રમત શરૂ કરો</button>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/bundle.mjs";

        const fruits = [
            { name: "સફરજન (APPLE)", emoji: "🍎" },
            { name: "કેળા (BANANA)", emoji: "🍌" },
            { name: "કેરી (MANGO)", emoji: "🥭" },
            { name: "દ્રાક્ષ (GRAPES)", emoji: "🍇" }
        ];

        let target = fruits[0];
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');
        
        // ફળોને ફરીથી સ્ક્રીન પર લાવવા માટે ફંક્શન
        let fruitObjs = fruits.map((f, i) => ({ ...f, x: 100 + i * 200, y: 300, isHeld: false }));

        document.getElementById('startBtn').onclick = async (e) => {
            e.target.style.display = 'none';
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            const handLandmarker = await HandLandmarker.createFromOptions(vision, { 
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task" }, 
                runningMode: "VIDEO" 
            });

            msg.innerText = "શોધો: " + target.name;

            function loop() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // બાસ્કેટ
                ctx.font = "80px Arial";
                ctx.fillText("🧺", canvas.width/2 - 40, canvas.height - 50);

                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks.length > 0) {
                    const tip = results.landmarks[0][8];
                    const hx = (1 - tip.x) * canvas.width;
                    const hy = tip.y * canvas.height;

                    fruitObjs.forEach(f => {
                        // પકડવાની ક્રિયા
                        if (!f.isHeld && Math.hypot(hx - f.x, hy - f.y) < 70) f.isHeld = true;
                        if (f.isHeld) { f.x = hx; f.y = hy; }

                        // બાસ્કેટમાં મૂકવાની ચકાસણી
                        if (f.isHeld && hy > canvas.height - 100) {
                            if (f.name === target.name) {
                                msg.innerText = "સાચો જવાબ! શાબાશ!";
                                // ફળને ફરીથી સ્ક્રીન પર નવી જગ્યાએ મૂકો
                                f.x = Math.random() * (canvas.width - 100) + 50;
                                f.y = Math.random() * 200 + 100;
                                f.isHeld = false;
                                
                                setTimeout(() => {
                                    target = fruits[Math.floor(Math.random() * fruits.length)];
                                    msg.innerText = "હવે શોધો: " + target.name;
                                }, 2000);
                            } else {
                                msg.innerText = "ખોટું ફળ! ફરી પ્રયત્ન કરો.";
                                f.isHeld = false;
                                f.x = 100 + (fruits.indexOf(f) * 200); // પાછું મૂળ જગ્યાએ
                                f.y = 300;
                            }
                        }
                    });
                }
                fruitObjs.forEach(f => ctx.fillText(f.emoji, f.x - 40, f.y + 40));
                requestAnimationFrame(loop);
            }
            loop();
        };
    </script>
</body>
</html>
