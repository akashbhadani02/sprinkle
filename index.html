<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fruit Catcher Game</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; color: white; font-family: sans-serif; }
        #v { position: fixed; top: 10px; right: 10px; width: 220px; border: 2px solid #fff; border-radius: 10px; transform: scaleX(-1); display: none; }
        #canvas { position: fixed; inset: 0; }
        #startBtn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; cursor: pointer; z-index: 10; background: #ff4757; color: white; border: none; border-radius: 10px; }
        #basket { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); width: 160px; height: 160px; border: 5px dashed #fff; display: flex; align-items: center; justify-content: center; font-size: 80px; }
        #score { position: fixed; top: 20px; left: 20px; font-size: 30px; }
    </style>
</head>
<body>
    <button id="startBtn">Start Camera & Game</button>
    <div id="score">Score: 0</div>
    <div id="basket">🧺</div>
    <video id="v" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/bundle.mjs";

        const video = document.getElementById("v");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");
        const scoreEl = document.getElementById("score");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let handLandmarker, heldFruit = null;
        let score = 0;
        let fruits = [
            { x: 100, y: 150, emoji: "🍎" }, { x: 250, y: 150, emoji: "🍌" },
            { x: 400, y: 150, emoji: "🍒" }, { x: 550, y: 150, emoji: "🥭" },
            { x: 700, y: 150, emoji: "🍇" }, { x: 100, y: 300, emoji: "🍓" },
            { x: 250, y: 300, emoji: "🍍" }, { x: 400, y: 300, emoji: "🥝" },
            { x: 550, y: 300, emoji: "🍉" }, { x: 700, y: 300, emoji: "🍊" }
        ];

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = "block";
                startBtn.style.display = "none";

                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-tasks/hand_landmarker/hand_landmarker.task" },
                    runningMode: "VIDEO"
                });
                video.addEventListener("loadeddata", predict);
            } catch (e) { alert("Camera access denied. Ensure you are using a local server!"); }
        }

        startBtn.addEventListener("click", init);

        function predict() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const results = handLandmarker.detectForVideo(video, performance.now());
            
            if (results.landmarks.length > 0) {
                const tip = results.landmarks[0][8];
                const hx = (1 - tip.x) * canvas.width;
                const hy = tip.y * canvas.height;

                if (!heldFruit) {
                    fruits.forEach(f => {
                        if (Math.hypot(f.x - hx, f.y - hy) < 60) heldFruit = f;
                    });
                } else {
                    heldFruit.x = hx; heldFruit.y = hy;
                    const b = document.getElementById("basket").getBoundingClientRect();
                    if (hx > b.left && hx < b.right && hy > b.top && hy < b.bottom) {
                        score++;
                        scoreEl.innerText = "Score: " + score;
                        heldFruit = null;
                        // Move fruit off-screen to signify "caught"
                        fruits = fruits.filter(f => f !== heldFruit); 
                    }
                }
            } else { heldFruit = null; }

            ctx.font = "60px serif";
            fruits.forEach(f => ctx.fillText(f.emoji, f.x - 30, f.y + 20));
            requestAnimationFrame(predict);
        }
    </script>
</body>
</html>
